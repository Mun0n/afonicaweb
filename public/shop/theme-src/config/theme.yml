parent: classic
name: afonica
display_name: Afonica Dark
version: 1.2.1
author:
  name: Afonica Naranjo
  email: contact@afonicanaranjo.com
  url: https://www.afonicanaranjo.com

meta:
  compatibility:
    from: 8.1.0
    to: ~
  available_layouts:
    layout-full-width:
      name: Full Width
      description: No side columns, ideal for distraction-free pages such as product pages.
    layout-both-columns:
      name: Three Columns
      description: One large central column and 2 side columns.
    layout-left-column:
      name: Two Columns, small left column
      description: Two columns with a small left column
    layout-right-column:
      name: Two Columns, small right column
      description: Two columns with a small right column

assets:
  use_parent_assets: true

global_settings:
  modules:
    to_disable:
      - ps_imageslider
      - ps_banner
      - ps_emailsubscription
  hooks:
    modules_to_hook:
      displayHome:
        - ps_featuredproducts
  image_types:
    cart_default:
      width: 125
      height: 125
      scope: [products]
    small_default:
      width: 98
      height: 98
      scope: [products, categories, manufacturers, suppliers]
    medium_default:
      width: 452
      height: 452
      scope: [products, manufacturers, suppliers]
    home_default:
      width: 400
      height: 480
      scope: [products]
    large_default:
      width: 800
      height: 960
      scope: [products, manufacturers, suppliers]
    category_default:
      width: 141
      height: 180
      scope: [categories]

theme_settings:
  default_layout: layout-full-width
